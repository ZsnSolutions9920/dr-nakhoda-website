name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        env:
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y sshpass
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no administrator@93.127.141.213 "
            echo '${{ secrets.VPS_PASSWORD }}' | sudo -S bash -c '
              cd ~/dr-nakhoda-website &&
              git pull origin main &&
              npm install &&
              npm run build &&
              pm2 restart drnakhoda || pm2 start npm --name drnakhoda -- start
            '
          "
