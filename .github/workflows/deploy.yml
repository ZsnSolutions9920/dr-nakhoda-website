name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 93.127.141.213
          username: administrator
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            sudo -i bash -c '
              cd ~/dr-nakhoda-website &&
              git pull origin main &&
              npm install &&
              npm run build &&
              pm2 restart drnakhoda || pm2 start npm --name "drnakhoda" -- start
            '
